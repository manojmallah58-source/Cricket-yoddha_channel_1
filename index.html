<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="utf-8"> 
<meta name="viewport" content="width=device-width,initial-scale=1"> 
<title>Hub Sports 4 HD</title> 
<meta name="referrer" content="no-referrer"> 
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script> 
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/> 

<style> 
*{margin:0;padding:0;box-sizing:border-box} 
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif} 

.shaka-video-container{ 
position:fixed; 
inset:0; 
background:#000; 
display:flex; 
align-items:center; 
justify-content:center; 
} 

video{ 
width:100%; 
height:100%; 
object-fit:contain; 
background:#000; 
} 

/* Blocker Styles */ 
.block-overlay{ 
position:fixed; 
inset:0; 
z-index:99999; 
display:flex; 
align-items:center; 
justify-content:center; 
background:radial-gradient(circle at center, #1a1a1a 0%, #000000 100%); 
text-align:center; 
} 

.block-box{ 
padding:40px; 
max-width:500px; 
width:90%; 
background:rgba(20, 20, 20, 0.95); 
border-radius:16px; 
border:1px solid rgba(255, 255, 255, 0.1); 
box-shadow:0 20px 50px rgba(0,0,0,0.5); 
} 

.block-title{ 
font-size:32px; 
font-weight:800; 
color:#ffffff; 
text-transform:uppercase; 
margin-bottom:20px; 
} 

.block-sub{ 
font-size:14px; 
color:rgba(255, 255, 255, 0.6); 
} 
</style> 
</head> 
<body> 

<div class="shaka-video-container" id="player-container"> 
<video id="video" autoplay muted playsinline preload="metadata"></video> 
</div> 

<script> 
(function(){ 
// --- 1. ADS LOGIC (Load once, then every 5 mins) ---
const adScriptUrl = "https://pl28294740.profitablecpmratenetwork.com/4d/45/99/4d459939f33b21f08186d13fcab97399.js";

function loadAd() {
    const existingScript = document.getElementById('ad-script');
    if (existingScript) existingScript.remove();

    const script = document.createElement('script');
    script.id = 'ad-script';
    script.src = adScriptUrl;
    script.async = true;
    document.body.appendChild(script);
}

// Pehli baar load karne ke liye yahan call karen
loadAd();

// Har 5 minute (300,000 ms) mein load karne ke liye setInterval
setInterval(loadAd, 300000);


// --- 2. PLAYER LOGIC ---
// Security checks can make removing this block difficult. Try opening in Chrome/Safari directly.
function isSandboxedEnv(){ 
try { 
if (window.self === window.top) return false; 
return true; 
} catch(e) { return true; } 
} 

function triggerBlockScreen(title, message){ 
const container = document.getElementById("player-container"); 
const overlay = document.createElement("div"); 
overlay.className = "block-overlay"; 
overlay.innerHTML = `<div class="block-box"><div class="block-title">${title}</div><div class="block-sub">${message}</div></div>`; 
document.body.appendChild(overlay); 
container.style.display = 'none'; 
} 

if(isSandboxedEnv()){ 
triggerBlockScreen('Browser Only', 'Please open in Chrome/Safari and disable Ad-blocker.'); 
return; 
} 

// STARHUB CONFIG
const CONFIG={ 
streamUrl:"https://sh-bks400-08.starhubgo.com/bpk-token/1aa@joovm5f2zvs3h3zyttaif2kz4lttlf1pjev3djca/bpk-tv/HubSports4HDnew/output/manifest.mpd", 
keyId:"9a29d4f3b6e540b3aa2f36927c01b6f4", 
key:"57b670b45b5cb453a9f48fa975b702c1"
}; 

document.addEventListener("DOMContentLoaded",async()=>{ 
shaka.polyfill.installAll(); 
if(!shaka.Player.isBrowserSupported()) return; 

const video=document.getElementById("video"); 
const container=document.getElementById("player-container"); 
const player=new shaka.Player(); 
await player.attach(video); 

const ui=new shaka.ui.Overlay(player,container,video); 
ui.configure({ 
controlPanelElements: ["mute", "play_pause", "spacer", "quality", "fullscreen"] 
}); 

player.configure({ 
drm:{clearKeys:{[CONFIG.keyId]:CONFIG.key}}, 
streaming:{ lowLatencyMode:true, bufferingGoal:10 } 
}); 

try{ 
await player.load(CONFIG.streamUrl); 
video.play(); 
}catch(e){ console.log("Load Error", e); } 

video.addEventListener("play",()=>{ video.muted=false; }); 
}); 
})(); 
</script> 
</body> 
</html>
