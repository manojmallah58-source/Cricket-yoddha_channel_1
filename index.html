<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .shaka-video-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        video {
            width: 100%;
            height: 100%;
            background: #000;
            object-fit: contain;
        }
        .shaka-spinner-container,
        .shaka-spinner,
        .shaka-spinner-svg {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
        }
    </style>
</head>
<body>
    <div class="shaka-video-container" data-shaka-player>
        <video autoplay playsinline preload="metadata" poster=""></video>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            shaka.polyfill.installAll();

            if (!shaka.Player.isBrowserSupported()) {
                console.error('Browser not supported');
                return;
            }

            const video = document.querySelector('video');
            const player = new shaka.Player();
            await player.attach(video);

            const container = document.querySelector('.shaka-video-container');
            const ui = new shaka.ui.Overlay(player, container, video);

            ui.configure({
                controlPanelElements: [
                    'play_pause', 'time_and_duration', 'mute', 'volume',
                    'spacer', 'language', 'captions', 'picture_in_picture',
                    'quality', 'fullscreen'
                ],
                volumeBarColors: {
                    base: 'purple',
                    level: 'purple'
                },
                seekBarColors: {
                    base: 'white',
                    buffered: 'red',
                    played: 'blue'
                }
            });

            // Note: Make sure these keys are valid for the new stream URL
            let drmConfig = {
                clearKeys: {
                    "df20894ec30954d3b28097c138f4cfda": "ff9b6292b1cddbd11a046029cb314634"
                }
            };

            let cookieHeader = "__hdnea__=st=1765451394~exp=1765537794~acl=/*~hmac=7e52d292c2fa49ad266158ccd51f9cb18247f99d727cc507c2f8454232b9260d";
            
            // Replaced with your new URL
            let streamUrl = "https://bpaita2.akamaized.net/bpk-tv/irdeto_com_Channel_250/output/manifest.mpd?hdntl=exp=1778173448~acl=%2fbpk-tv%2firdeto_com_Channel_250%2foutput%2f*~id=9905477177~data=hdntl~hmac=18c497e1a8f2f88e7c4828f8db8e624f5bdd543474d83b3c3ff40d4ede8f621f";

            try {
                const response = await fetch('https://raw.githubusercontent.com/alex8875/m3u/refs/heads/main/jstar.m3u');
                const m3uText = await response.text();
                const lines = m3uText.split('\n');

                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].includes('Star_Sports_HD')) {
                        for (let j = i - 1; j >= 0; j--) {
                            if (lines[j].startsWith('#EXTHTTP:')) {
                                const cookieMatch = lines[j].match(/"cookie":"([^"]+)"/);
                                if (cookieMatch) {
                                    cookieHeader = cookieMatch[1];
                                }
                                break;
                            }
                        }
                        break;
                    }
                }
            } catch (error) {
                console.error('Failed to fetch M3U:', error);
            }

            player.configure({
                drm: drmConfig,
                streaming: {
                    lowLatencyMode: true,
                    bufferingGoal: 15,
                    rebufferingGoal: 2,
                    bufferBehind: 15,
                    retryParameters: {
                        timeout: 10000,
                        maxAttempts: 5,
                        baseDelay: 300,
                        backoffFactor: 1.2
                    },
                    segmentRequestTimeout: 8000,
                    segmentPrefetchLimit: 2,
                    useNativeHlsOnSafari: true
                },
                manifest: {
                    retryParameters: {
                        timeout: 8000,
                        maxAttempts: 3
                    }
                }
            });

            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
                request.headers['Cookie'] = cookieHeader;

                if (
                    (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || 
                     type === shaka.net.NetworkingEngine.RequestType.SEGMENT) &&
                    request.uris[0] && !request.uris[0].includes('__hdnea=')
                ) {
                    const separator = request.uris[0].includes('?') ? '&' : '?';
                    request.uris[0] += separator + cookieHeader;
                }
            });

            const attemptAutoplay = async () => {
                try {
                    video.muted = false;
                    await video.play();
                    return true;
                } catch (error) {
                    try {
                        video.muted = true;
                        await video.play();
                        return true;
                    } catch (mutedError) {
                        return false;
                    }
                }
            };

            player.addEventListener('error', (event) => {
                console.error('Shaka Player Error:', event.detail);
            });

            video.addEventListener('play', () => {
                if (window.self === window.top && !document.fullscreenElement && window.innerWidth <= 768) {
                    container.requestFullscreen().catch(() => {});
                }
            }, { once: true });

            let hasUserInteracted = false;
            const enableSoundOnInteraction = () => {
                if (!hasUserInteracted && video.muted) {
                    video.muted = false;
                    hasUserInteracted = true;
                }
            };
            ['click', 'touchstart', 'keydown'].forEach(event => {
                document.addEventListener(event, enableSoundOnInteraction, { once: true });
            });

            try {
                await player.load(streamUrl);
                if (video.readyState >= 3) {
                    await attemptAutoplay();
                } else {
                    video.addEventListener('canplay', attemptAutoplay, { once: true });
                }
            } catch (error) {
                console.error('Load error:', error);
            }
        });
    </script>
</body>
</html>
