<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; font-family: sans-serif; }
        .shaka-video-container { position: absolute; inset: 0; width: 100%; height: 100%; }
        video { width: 100%; height: 100%; background: #000; object-fit: contain; }
    </style>
</head>
<body>
    <div class="shaka-video-container" data-shaka-player>
        <video autoplay playsinline preload="metadata"></video>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            shaka.polyfill.installAll();
            const video = document.querySelector('video');
            const player = new shaka.Player();
            await player.attach(video);
            const container = document.querySelector('.shaka-video-container');
            new shaka.ui.Overlay(player, container, video);

            // UPDATED: Stream URL and DRM Configuration
            let streamUrl = "https://jiotvmblive.cdn.jio.com/bpk-tv/Ten_HD_MOB/WDVLive/index.mpd?__hdnea__=st=1780653814~exp=1780675414~acl=/*~hmac=833da75b8830292913c77f267596646ca7d4c8123036d4afa500312251fba1ce";
            
            let drmConfig = {
                clearKeys: {
                    "3525c924e54154b39533d86b1c7a428a": "8548b566fc6608a7d3bd601ee5f3d889"
                }
            };
            
            // Cookie extracted from URL parameters
            let cookieHeader = "__hdnea__=st=1780653814~exp=1780675414~acl=/*~hmac=833da75b8830292913c77f267596646ca7d4c8123036d4afa500312251fba1ce";

            player.configure({
                drm: drmConfig,
                streaming: { lowLatencyMode: true }
            });

            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['Cookie'] = cookieHeader;
            });

            try {
                await player.load(streamUrl);
            } catch (error) {
                console.error('Load error:', error);
            }
        });
    </script>
</body>
</html>
