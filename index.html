<!DOCTYPE html>  
<html>  
<head>  
  <meta charset="UTF-8">  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>Prime By Cricket Yoddha</title>     
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">  
  <style>  
   * { margin: 0; padding: 0; box-sizing: border-box; }  
    html, body {  
      background: #000;  
      height: 100vh;  
      width: 100vw;  
      overflow: hidden;  
      font-family: system-ui, -apple-system, sans-serif;  
    }  
    .shaka-video-container {  
      position: absolute;  
      inset: 0;  
      width: 100%;  
      height: 100%;  
    }  
    video {  
      width: 100%;  
      height: 100%;  
      background: #000;  
      object-fit: contain;  
    }  
    .shaka-spinner-container { display: none !important; }  
  </style>  
</head>  
<body>  
  <div class="shaka-video-container" data-shaka-player>  
    <video id="video" autoplay muted playsinline preload="metadata" poster="https://i.ibb.co/8DHnQ6f8/image-search-1770442885382.jpg"></video>  
  </div>  
  
  <script>  
    async function initApp() {  
      shaka.polyfill.installAll();  
      if (shaka.Player.isBrowserSupported()) {  
        initPlayer();  
      } else {  
        console.error('Browser not supported!');  
      }  
    }

    async function initPlayer() {  
      const video = document.getElementById('video');  
      const container = document.querySelector('.shaka-video-container');  
      const player = new shaka.Player(video);  
      
      const ui = new shaka.ui.Overlay(player, container, video);  
      ui.configure({  
        controlPanelElements: [  
          'play_pause', 'time_and_duration', 'mute', 'volume',  
          'spacer', 'quality', 'picture_in_picture', 'fullscreen'  
        ],  
        seekBarColors: {  
          base: 'rgba(255, 255, 0, 0.3)',  
          buffered: 'rgba(255, 255, 0, 0.5)',  
          played: 'rgb(255, 255, 0)'  
        }  
      });  
  
      // ✅ Updated New Stream URL
      const streamUrl = "https://otte-azion.live.pv-cdn.net/sin-nitro/live/clients/dash/enc/kmdxq2mru1/out/v1/d346b8e088254045bf5ecde7cf5d335a/cenc.mpd";  
      
      player.configure({  
        drm: {  
          clearKeys: {  
            // ✅ Updated New DRM Keys (KID : KEY)
            "03018e1facaf7f344fa3d7439c6fc5b2": "48a92e8fc0c897a7b23044f4b86e544b"  
          }  
        },  
        streaming: {  
          lowLatencyMode: true,  
          jumpLargeGaps: true,
          rebufferingGoal: 2,
          bufferingGoal: 10
        }  
      });  
  
      player.addEventListener('error', (e) => console.error('Shaka Error:', e.detail));  
  
      try {  
        await player.load(streamUrl);  
        console.log("Stream successfully loaded with new keys!");  
      } catch (error) {  
        console.error('Error loading stream:', error);  
      }  
    }  

    document.addEventListener('shaka-ui-loaded', initApp);
    document.addEventListener('DOMContentLoaded', () => { if (!window.shaka) initApp(); });
  </script>  
</body>  
</html>
