<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Sports 1 HD Hindi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .shaka-video-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        video {
            width: 100%;
            height: 100%;
            background: #000;
            object-fit: contain;
        }
        /* Spinner hide karne ke liye */
        .shaka-spinner-container, .shaka-spinner, .shaka-spinner-svg {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
        }
    </style>
</head>
<body>
    <div class="shaka-video-container" data-shaka-player>
        <video autoplay playsinline preload="metadata" poster=""></video>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            shaka.polyfill.installAll();

            if (!shaka.Player.isBrowserSupported()) {
                console.error('Browser not supported');
                return;
            }

            const video = document.querySelector('video');
            const player = new shaka.Player();
            await player.attach(video);

            const container = document.querySelector('.shaka-video-container');
            const ui = new shaka.ui.Overlay(player, container, video);

            ui.configure({
                controlPanelElements: [
                    'play_pause', 'time_and_duration', 'mute', 'volume',
                    'spacer', 'language', 'captions', 'picture_in_picture',
                    'quality', 'fullscreen'
                ],
                volumeBarColors: { base: 'purple', level: 'purple' },
                seekBarColors: { base: 'white', buffered: 'red', played: 'blue' }
            });

            // --- NAYA DATA YAHA HAI ---
            let drmConfig = {
                clearKeys: {
                    "400131994b445d8c8817202248760fda": "2d56cb6f07a75b9aff165d534ae2bfc4"
                }
            };
            
            // Naya Stream URL
            let streamUrl = "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/index.mpd?__hdnea__=st=1777948867~exp=1777970467~acl=/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/*~hmac=90d2ce6c198be94b56fe482a0116ebb639df746605b608c0b9a5a544b830e2e3";
            
            // Cookie nikalne ke liye URL se split
            let cookieHeader = streamUrl.split('?')[1] || "";

            player.configure({
                drm: drmConfig,
                streaming: {
                    lowLatencyMode: true,
                    bufferingGoal: 15,
                    rebufferingGoal: 2,
                    bufferBehind: 15,
                    retryParameters: { timeout: 10000, maxAttempts: 5 },
                    useNativeHlsOnSafari: true
                }
            });

            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
                
                // Har segment request mein cookie attach karna
                if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || 
                    type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
                    if (!request.uris[0].includes('__hdnea=')) {
                        const separator = request.uris[0].includes('?') ? '&' : '?';
                        request.uris[0] += separator + cookieHeader;
                    }
                }
            });

            const attemptAutoplay = async () => {
                try {
                    video.muted = false;
                    await video.play();
                } catch (error) {
                    video.muted = true;
                    await video.play();
                }
            };

            video.addEventListener('play', () => {
                if (window.innerWidth <= 768) {
                    container.requestFullscreen().catch(() => {});
                }
            }, { once: true });

            try {
                await player.load(streamUrl);
                await attemptAutoplay();
            } catch (error) {
                console.error('Load error:', error);
            }
            
            // User interaction par sound enable karna
            ['click', 'touchstart'].forEach(ev => {
                document.addEventListener(ev, () => { video.muted = false; }, { once: true });
            });
        });
    </script>
</body>
</html>
