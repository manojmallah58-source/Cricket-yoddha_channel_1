<!DOCTYPE html>  
<html>  
<head>  
  <meta charset="UTF-8">  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>Prime Hindi - Cricket Yoddha</title>     
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">  
  <style>  
   * { margin: 0; padding: 0; box-sizing: border-box; }  
    html, body {  
      background: #000;  
      height: 100vh;  
      width: 100vw;  
      overflow: hidden;  
      font-family: system-ui, -apple-system, sans-serif;  
    }  
    .shaka-video-container {  
      position: absolute;  
      inset: 0;  
      width: 100%;  
      height: 100%;  
    }  
    video {  
      width: 100%;  
      height: 100%;  
      background: #000;  
      object-fit: contain;  
    }  
    .shaka-spinner-container { display: none !important; }  
  </style>  
</head>  
<body>  
  <div class="shaka-video-container" data-shaka-player>  
    <video id="video" autoplay muted playsinline preload="metadata" poster="https://i.ibb.co/VrsnMcD/image-search-1765615733453.webp"></video>  
  </div>  
  
  <script>  
    async function initApp() {  
      shaka.polyfill.installAll();  
      if (shaka.Player.isBrowserSupported()) {  
        initPlayer();  
      } else {  
        console.error('Browser not supported!');  
      }  
    }

    async function initPlayer() {  
      const video = document.getElementById('video');  
      const container = document.querySelector('.shaka-video-container');  
      const player = new shaka.Player(video);  
      
      const ui = new shaka.ui.Overlay(player, container, video);  
      ui.configure({  
        controlPanelElements: [  
          'play_pause', 'time_and_duration', 'mute', 'volume',  
          'spacer', 'quality', 'picture_in_picture', 'fullscreen'  
        ],  
        seekBarColors: {  
          base: 'rgba(255, 255, 0, 0.3)',  
          buffered: 'rgba(255, 255, 0, 0.5)',  
          played: 'rgb(255, 255, 0)'  
        }  
      });  
  
      // ✅ New HLS Stream Details
      const streamUrl = "https://livevideos.cricbuzz.com/hls/live/2123398/WCB-CA/9241/149651/master.m3u8";  
      const userAgent = "Cricbuzz/7.00.01 (Linux;Android 13) AndroidXMedia3/1.5.1";
      const cookieData = "hdntl=exp=1775048591~acl=%2f*~id=xunivamy%40denipl.com~data=hdntl,flavour%3aCB,matchId%3a149651,debug4xx%3afalse,country%3aAE~hmac=d6918e916233d9f9df45e576ea1a75f27142ad8904d83f5df1d58fb4a131e6e2";

      // ✅ Request Filter to add Headers
      player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers['User-Agent'] = userAgent;
        request.headers['Cookie'] = cookieData;
        // X-Forwarded-For typically doesn't work in browsers due to security, but adding for completeness
        request.headers['X-Forwarded-For'] = '100.42.240.25'; 
      });

      player.configure({  
        streaming: {  
          lowLatencyMode: true,  
          jumpLargeGaps: true,
          rebufferingGoal: 2,
          bufferingGoal: 10
        }  
      });  
  
      player.addEventListener('error', (e) => console.error('Shaka Error:', e.detail));  
  
      try {  
        await player.load(streamUrl);  
        console.log("HLS Stream successfully loaded!");  
      } catch (error) {  
        console.error('Error loading stream:', error);  
      }  
    }  

    document.addEventListener('shaka-ui-loaded', initApp);
    document.addEventListener('DOMContentLoaded', () => { if (!window.shaka) initApp(); });
  </script>  
</body>  
</html>
