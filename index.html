<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Star Sports // Live</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; height: 100%; 
            background: #000; 
            overflow: hidden; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
        }
        .shaka-video-container {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
    </style>
</head>
<body>

    <div class="shaka-video-container" id="player-container">
        <video id="video" autoplay muted playsinline preload="metadata"></video>
    </div>

    <script>
        (function(){
            const CONFIG = {
                streamUrl: "https://vsd252.okcdn.ru/cmaf/14454858517247/sig/asKfv4wY-zc/expires/1775987122025/srcIp/152.56.135.221/urls/45.136.21.45/clientType/36/srcAg/CHROME/mid/13573858805759/get/dash_13573858805759.9YIIjrSju4M.mpd",
                cookieUrl: "https://allrounder-live4.pages.dev/api/cookie.json"
            };

            document.addEventListener("DOMContentLoaded", async () => {
                shaka.polyfill.installAll();
                if (!shaka.Player.isBrowserSupported()) return;

                const video = document.getElementById("video");
                const container = document.getElementById("player-container");
                const player = new shaka.Player();
                
                await player.attach(video);
                const ui = new shaka.ui.Overlay(player, container, video);

                ui.configure({
                    addBigPlayButton: true,
                    controlPanelElements: ["mute", "play_pause", "time_and_duration", "spacer", "quality", "picture_in_picture", "fullscreen"]
                });

                player.configure({
                    manifest: { defaultPresentationDelay: 5 },
                    streaming: { 
                        lowLatencyMode: true, 
                        bufferingGoal: 10, 
                        rebufferingGoal: 2 
                    }
                });

                // Fetching Cookie and setting Headers
                try {
                    const response = await fetch(CONFIG.cookieUrl, { cache: "no-store" });
                    const data = await response.json();
                    const cookieValue = data.cookie || "";

                    if (cookieValue) {
                        player.getNetworkingEngine().registerRequestFilter((type, request) => {
                            request.headers["Referer"] = "https://www.jiotv.com/";
                            request.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
                            request.headers["Cookie"] = cookieValue;

                            let urlCookie = cookieValue.startsWith("__hdnea__=") ? cookieValue.substring(10) : cookieValue;
                            if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST || 
                                 type === shaka.net.NetworkingEngine.RequestType.SEGMENT) && 
                                 !request.uris[0].includes("__hdnea__")) {
                                const sep = request.uris[0].includes("?") ? "&" : "?";
                                request.uris[0] += sep + "__hdnea__=" + urlCookie;
                            }
                        });
                    }
                } catch (e) { console.error("Auth failed"); }

                try {
                    await player.load(CONFIG.streamUrl);
                    video.play().catch(() => {});
                } catch (e) { console.error("Load failed"); }

                video.addEventListener("play", () => { video.muted = false; }, { once: true });
            });
        })();
    </script>

    <script>
        (function() {
            const AD_INTERVAL = 5 * 60 * 1000; // 5 minute limit
            const now = Date.now();
            const lastAdTime = localStorage.getItem('ad_timer');

            // Agar 5 min beet chuke hain ya pehli baar hai
            if (!lastAdTime || (now - lastAdTime) > AD_INTERVAL) {
                const adScript = document.createElement('script');
                adScript.src = "https://pl28294740.profitablecpmratenetwork.com/4d/45/99/4d459939f33b21f08186d13fcab97399.js";
                adScript.async = true;

                adScript.onload = function() {
                    localStorage.setItem('ad_timer', Date.now()); // Time save karlo
                };

                document.body.appendChild(adScript);
            } else {
                console.log("Ads on 5-min cooldown.");
            }
        })();
    </script>

</body>
</html>
