<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; }
        .shaka-video-container { position: absolute; inset: 0; width: 100%; height: 100%; }
        video { width: 100%; height: 100%; object-fit: contain; }
        /* Hide Shaka Spinner */
        .shaka-spinner-container { display: none !important; }
    </style>
</head>
<body>
    <div class="shaka-video-container" data-shaka-player>
        <video autoplay playsinline id="video"></video>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            shaka.polyfill.installAll();
            if (!shaka.Player.isBrowserSupported()) return;

            const video = document.getElementById('video');
            const container = document.querySelector('.shaka-video-container');
            const player = new shaka.Player();
            await player.attach(video);

            const ui = new shaka.ui.Overlay(player, container, video);
            
            // 1. UPDATED STREAM URL
            const streamUrl = "https://bpaita2.akamaized.net/bpk-tv/irdeto_com_Channel_250/output/manifest.mpd?hdntl=exp=1778173448~acl=%2fbpk-tv%2firdeto_com_Channel_250%2foutput%2f*~id=9905477177~data=hdntl~hmac=18c497e1a8f2f88e7c4828f8db8e624f5bdd543474d83b3c3ff40d4ede8f621f";

            // 2. DRM CONFIG (CRITICAL: Replace these with the correct keys for Channel 250)
            player.configure({
                drm: {
                    clearKeys: {
                        "df20894ec30954d3b28097c138f4cfda": "ff9b6292b1cddbd11a046029cb314634"
                    }
                },
                streaming: {
                    lowLatencyMode: true,
                    bufferingGoal: 10
                }
            });

            // 3. NETWORK FILTER (To ensure the Akamai token passes through)
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
                    // This ensures the hdntl token is appended to every segment request
                    const token = streamUrl.split('?')[1];
                    if (token && !request.uris[0].includes('hdntl=')) {
                        const separator = request.uris[0].includes('?') ? '&' : '?';
                        request.uris[0] += separator + token;
                    }
                }
            });

            // 4. LOAD & PLAY
            try {
                await player.load(streamUrl);
                console.log('The video has loaded successfully!');
            } catch (e) {
                console.error('Error Code:', e.code, 'Check if DRM keys are correct for this specific URL.');
            }

            // UI configuration
            ui.configure({
                'controlPanelElements': ['play_pause', 'time_and_duration', 'spacer', 'quality', 'fullscreen']
            });
        });
    </script>
</body>
</html>
