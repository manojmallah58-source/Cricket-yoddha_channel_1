<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="utf-8"> 
<meta name="viewport" content="width=device-width,initial-scale=1"> 
<title>Star Sports HD 1 Hindi - Live</title> 
<meta name="referrer" content="no-referrer"> 
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script> 
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/> 

<style> 
*{margin:0;padding:0;box-sizing:border-box} 
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:sans-serif} 

.shaka-video-container{ 
position:fixed; 
inset:0; 
background:#000; 
display:flex; 
align-items:center; 
justify-content:center; 
} 

video{ 
width:100%; 
height:100%; 
object-fit:contain; 
} 
</style> 
</head> 
<body> 

<div class="shaka-video-container" id="player-container"> 
<video id="video" autoplay muted playsinline preload="metadata"></video> 
</div> 

<script> 
(function(){ 
// NEW UPDATED CONFIG FOR STAR SPORTS HD 1 HINDI
const CONFIG={ 
streamUrl:"https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/index.mpd", 
keyId:"400131994b445d8c8817202248760fda", 
key:"2d56cb6f07a75b9aff165d534ae2bfc4", 
manualCookie:"__hdnea__=st=1777463547~exp=1777485147~acl=/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/*~hmac=7c9ca23b8a7177f41af65706c924858324a51e83cf2c0de38d5180f2dbe98890"
}; 

document.addEventListener("DOMContentLoaded",async()=>{ 
shaka.polyfill.installAll(); 
if(!shaka.Player.isBrowserSupported()) return; 

const video=document.getElementById("video"); 
const container=document.getElementById("player-container"); 

const player=new shaka.Player(); 
await player.attach(video); 

const ui=new shaka.ui.Overlay(player,container,video); 
ui.configure({ 
addBigPlayButton: true, 
controlPanelElements: ["mute", "play_pause", "time_and_duration", "spacer", "quality", "picture_in_picture", "fullscreen"] 
}); 

player.configure({ 
drm:{clearKeys:{[CONFIG.keyId]:CONFIG.key}}, 
manifest:{defaultPresentationDelay:5}, 
streaming:{ lowLatencyMode:true, bufferingGoal:10, rebufferingGoal:2, safeSeekOffset:5 } 
}); 

player.getNetworkingEngine().registerRequestFilter((type,request)=>{ 
request.headers["Referer"]="https://www.jiotv.com/"; 
request.headers["User-Agent"]="plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6"; 
request.headers["Cookie"]=CONFIG.manualCookie; 

// Har segment ke saath cookie attach karne ke liye
let urlCookie = CONFIG.manualCookie; 
if((type===shaka.net.NetworkingEngine.RequestType.MANIFEST || 
    type===shaka.net.NetworkingEngine.RequestType.SEGMENT) && 
   !request.uris[0].includes("__hdnea__")){ 
    const sep = request.uris[0].includes("?") ? "&" : "?"; 
    request.uris[0] += sep + urlCookie; 
} 
}); 

try{ 
await player.load(CONFIG.streamUrl); 
video.play().catch(()=>{}); 
}catch(e){
    console.error("Playback failed", e);
} 

video.addEventListener("play",()=>{ video.muted=false; }); 
}); 
})(); 
</script> 
</body> 
</html>
