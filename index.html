<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Star Sports HD 1 Hindi - Live</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; height: 100%; 
            background: #000; 
            overflow: hidden; 
            font-family: sans-serif; 
        }

        .shaka-video-container {
            position: fixed;
            inset: 0;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

<div class="shaka-video-container" id="player-container" data-shaka-player-container>
    <video id="video" autoplay playsinline data-shaka-player-video></video>
</div>

<script>
const CONFIG = {
    // The stream URL without the parameters for internal processing
    streamUrl: "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/index.mpd",
    // Extracted DRM Keys
    keyId: "400131994b445d8c8817202248760fda",
    key: "2d56cb6f07a75b9aff165d534ae2bfc4",
    // Extracted Token from your URL
    token: "st=1777374561~exp=1777396161~acl=/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/*~hmac=c5fe9544bc8eeaf888382de43fe67f979b8d0a12e22d704c5d79de6702c432ae"
};

async function initPlayer() {
    // Install polyfills
    shaka.polyfill.installAll();
    if (!shaka.Player.isBrowserSupported()) {
        console.error('Browser not supported!');
        return;
    }

    const video = document.getElementById('video');
    const container = document.getElementById('player-container');
    const player = new shaka.Player(video);

    // Create UI
    const ui = new shaka.ui.Overlay(player, container, video);
    ui.configure({
        'controlPanelElements': ["play_pause", "time_and_duration", "spacer", "quality", "mute", "volume", "fullscreen"]
    });

    // DRM & Streaming Configuration
    player.configure({
        drm: {
            clearKeys: {
                [CONFIG.keyId]: CONFIG.key
            }
        },
        streaming: {
            rebufferingGoal: 2,
            bufferingGoal: 10,
        }
    });

    // Request Filter to add required Jio Headers and Auth Token
    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        // Essential Headers
        request.headers["Referer"] = "https://www.jiotv.com/";
        request.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
        
        // Append token to Manifest and Segment requests
        if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || 
            type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
            const separator = request.uris[0].includes('?') ? '&' : '?';
            request.uris[0] += separator + "__hdnea__=" + CONFIG.token;
        }
    });

    try {
        await player.load(CONFIG.streamUrl);
        console.log('The video has now been loaded!');
    } catch (e) {
        console.error('Error code', e.code, 'object', e);
    }
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>

</body>
</html>
