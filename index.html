<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Sports 1 Hindi HD</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .shaka-video-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }
    /* Hide the default loading spinner */
    .shaka-spinner-container { display: none !important; }
  </style>
</head>
<body>
  <div class="shaka-video-container" data-shaka-player>
    <video autoplay playsinline preload="metadata"></video>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      shaka.polyfill.installAll();

      if (!shaka.Player.isBrowserSupported()) {
        console.error('Browser not supported');
        return;
      }

      const video = document.querySelector('video');
      const player = new shaka.Player();
      await player.attach(video);

      const container = document.querySelector('.shaka-video-container');
      const ui = new shaka.ui.Overlay(player, container, video);

      ui.configure({
        controlPanelElements: [
          'play_pause', 'time_and_duration', 'spacer', 
          'mute', 'volume', 'quality', 'fullscreen'
        ],
        volumeBarColors: { base: 'purple', level: 'purple' },
        seekBarColors: { base: 'white', buffered: 'red', played: 'blue' }
      });

      // --- UPDATED CREDENTIALS FROM YOUR LINK ---
      const drmConfig = {
        clearKeys: {
          "8ea9b607549252068e260a5f4d7dd321": "350c0aaffedf51cc1502e9543c7c885e"
        }
      };

      const cookieHeader = "__hdnea__=st=1773629375~exp=1773715775~acl=/*~hmac=ef55190f024fdd08cbd1abb181b06b9166148359dd2f24a0f7036ab745bb3628";
      const streamUrl = "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_1_Hindi_BTS/output/index.mpd?" + cookieHeader;

      player.configure({
        drm: drmConfig,
        streaming: {
          lowLatencyMode: true,
          bufferingGoal: 10,
          rebufferingGoal: 2,
        }
      });

      // Network Filter to handle CDN authentication
      player.getNetworkingEngine().registerRequestFilter((type, request) => {
        // Adding headers often blocked by browsers, but useful if running in WebView/App
        request.headers['User-Agent'] = "Exoplayer";
        
        // Append cookie to segment and manifest URLs if not already present
        if (!request.uris[0].includes('__hdnea__')) {
          const separator = request.uris[0].includes('?') ? '&' : '?';
          request.uris[0] += separator + cookieHeader;
        }
      });

      // Autoplay & Interaction Logic
      const attemptPlay = async () => {
        try {
          await video.play();
        } catch (e) {
          video.muted = true;
          await video.play();
        }
      };

      try {
        await player.load(streamUrl);
        await attemptPlay();
      } catch (error) {
        console.error('Load error:', error);
      }

      // Unmute on first click
      document.addEventListener('click', () => { if(video.muted) video.muted = false; }, { once: true });
    });
  </script>
</body>
</html>
