<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Star Sports HD 1 Hindi - Clean Player</title>
    <meta name="referrer" content="no-referrer">
    
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; }
        #player-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="player-container" data-shaka-player-container>
        <video id="video" data-shaka-player autoplay playsinline></video>
    </div>

<script>
// CONFIGURATION: Updated with your Hindi stream details
const CONFIG = {
    streamUrl: "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/index.mpd",
    keyId: "400131994b445d8c8817202248760fda",
    key: "2d56cb6f07a75b9aff165d534ae2bfc4",
    cookie: "__hdnea__=st=1777293170~exp=1777314770~acl=/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/*~hmac=81c33dc941843959680056cc1981057c304bfff5f9d9d3f2412ac9cbedf0b98f"
};

async function initPlayer() {
    // Install polyfills
    shaka.polyfill.installAll();
    if (!shaka.Player.isBrowserSupported()) {
        console.error('Browser not supported!');
        return;
    }

    const video = document.getElementById('video');
    const container = document.getElementById('player-container');
    const player = new shaka.Player(video);

    // UI Configuration
    const ui = new shaka.ui.Overlay(player, container, video);
    ui.configure({
        'controlPanelElements': ["play_pause", "mute", "volume", "fullscreen", "quality", "spacer"]
    });

    // DRM & Streaming Config
    player.configure({
        drm: {
            clearKeys: {
                [CONFIG.keyId]: CONFIG.key
            }
        },
        streaming: {
            bufferingGoal: 15,
            rebufferingGoal: 2,
            lowLatencyMode: true
        }
    });

    // Request Filter to inject Headers and Cookies
    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers["Referer"] = "https://www.jiotv.com/";
        request.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
        request.headers["Cookie"] = CONFIG.cookie;

        // Append cookie to segment URLs if not present
        if (type === shaka.net.NetworkingEngine.RequestType.SEGMENT || 
            type === shaka.net.NetworkingEngine.RequestType.MANIFEST) {
            const separator = request.uris[0].includes('?') ? '&' : '?';
            if (!request.uris[0].includes('__hdnea__')) {
                request.uris[0] += separator + CONFIG.cookie;
            }
        }
    });

    try {
        await player.load(CONFIG.streamUrl);
        console.log('Stream loaded successfully');
    } catch (error) {
        console.error('Error loading stream:', error);
    }
}

document.addEventListener('shaka-ui-loaded', initPlayer);
document.addEventListener('DOMContentLoaded', () => {
    if (!window['shaka-ui-loaded-event']) initPlayer();
});
</script>
</body>
</html>
