<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Video Player</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FMP9REY96D"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-FMP9REY96D');
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            overflow: hidden; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }

        .shaka-video-container {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* Hiding unnecessary elements */
        .block-overlay, .custom-watermark {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="shaka-video-container" id="player-container">
        <video id="video" autoplay muted playsinline preload="metadata"></video>
    </div>

    <script>
        // Main Player Logic (Obfuscated part from original source)
        (function() {
            const streamConfig = {
                'streamUrl': 'https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/index.m3u8',
                'keyId': 'ad28393a42cb55c7f994ad10ce83e22b',
                'key': '4382bab87d2d56cb6f07a75b9aff1620',
            };

            async function initPlayer() {
                shaka.polyfill.installAll();
                if (!shaka.Player.isBrowserSupported()) return;

                const video = document.getElementById('video');
                const container = document.getElementById('player-container');
                const player = new shaka.Player(video);
                
                const ui = new shaka.ui.Overlay(player, container, video);
                ui.configure({
                    'addBigPlayButton': true,
                    'controlPanelElements': ['play_pause', 'time_and_duration', 'spacer', 'mute', 'quality', 'fullscreen', 'picture_in_picture']
                });

                player.configure({
                    'drm': {
                        'clearKeys': {
                            [streamConfig.keyId]: streamConfig.key
                        }
                    },
                    'manifest': { 'defaultPresentationDelay': 0 },
                    'streaming': {
                        'lowLatencyMode': true,
                        'bufferingGoal': 10
                    }
                });

                try {
                    await player.load(streamConfig.streamUrl);
                    console.log('The video has now been loaded!');
                } catch (e) {
                    console.error('Error code', e.code, 'object', e);
                }
            }

            document.addEventListener('DOMContentLoaded', initPlayer);
        })();
    </script>

</body>
</html>
