<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Star Sports 1 Hindi - Live</title>
    <meta name="referrer" content="no-referrer">
    
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;background:#000;overflow:hidden;}
        .shaka-video-container{position:fixed;inset:0;background:#000;}
        video{width:100%;height:100%;object-fit:contain;}
    </style>
</head>
<body>

<div class="shaka-video-container" id="player-container" data-shaka-player-container>
    <video id="video" data-shaka-player-video autoplay muted playsinline preload="metadata"></video>
</div>

<script>
// --- AD CONTROL (5 Min Gap) ---
(function() {
    const AD_GAP = 5 * 60 * 1000;
    const AD_KEY = 'last_ad_trigger_time';
    const currentTime = new Date().getTime();
    const lastShown = localStorage.getItem(AD_KEY);

    if (!lastShown || (currentTime - lastShown > AD_GAP)) {
        var script = document.createElement('script');
        script.src = "https://pl28294740.profitablecpmratenetwork.com/4d/45/99/4d459939f33b21f08186d13fcab97399.js";
        script.async = true;
        document.body.appendChild(script);
        localStorage.setItem(AD_KEY, currentTime);
    }
})();

// --- PLAYER ENGINE ---
async function initPlayer() {
    const video = document.getElementById('video');
    const container = document.getElementById('player-container');
    const player = new shaka.Player(video);
    
    const ui = new shaka.ui.Overlay(player, container, video);
    ui.configure({
        'controlPanelElements': ["mute", "play_pause", "time_and_duration", "spacer", "quality", "fullscreen"]
    });

    // Configuration for DRM and Low Latency
    player.configure({
        drm: {
            clearKeys: {
                "bd1ea6a1c1fb5dcdb709434e0826bbc0": "f57f22cba32739ce7beb1fab3f3d060b"
            }
        },
        streaming: {
            lowLatencyMode: true,
            bufferingGoal: 10
        }
    });

    const streamUrl = "https://jiotvioslive.cdn.jio.com/bpk-tv/StarSportsHD2Hin_BTS//output/index.mpd";
    const cookieValue = "st=1775370547~exp=1775456947~acl=/*~hmac=c94c324abf3cae8f90d791778e154cd35fb1bd0af38825648a1b031c7ae6de2d";

    // Request Filter for Cookie & Headers
    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        // Append cookie to URLs
        const separator = request.uris[0].includes('?') ? '&' : '?';
        request.uris[0] += separator + "__hdnea__=" + cookieValue;

        // Spoofing Headers for better compatibility
        request.headers['Origin'] = 'https://jiotv.com';
        request.headers['Referer'] = 'https://jiotv.com/';
    });

    try {
        await player.load(streamUrl);
        console.log('Stream loaded successfully');
    } catch (error) {
        console.error('Error loading stream:', error);
    }

    // Auto-unmute when user clicks
    video.addEventListener("play", () => { video.muted = false; });
}

document.addEventListener('shaka-ui-loaded', initPlayer);
document.addEventListener('shaka-install-failed', () => console.error('Shaka failed to load'));
</script>
</body>
</html>
